<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Employee Directory</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: white;
      padding: 24px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }

    header svg { flex-shrink: 0; }

    header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    header p {
      font-size: 0.85rem;
      opacity: 0.7;
      margin-top: 2px;
    }

    .container {
      max-width: 1200px;
      margin: 32px auto;
      padding: 0 24px;
    }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: white;
      border-radius: 12px;
      padding: 20px 24px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .stat-card .label {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #888;
      font-weight: 600;
    }

    .stat-card .value {
      font-size: 2rem;
      font-weight: 700;
      color: #0f3460;
      line-height: 1;
    }

    .toolbar {
      background: white;
      border-radius: 12px;
      padding: 18px 20px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .search-wrap {
      position: relative;
      flex: 1;
      min-width: 200px;
    }

    .search-wrap svg {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #aaa;
      pointer-events: none;
    }

    .search-wrap input {
      width: 100%;
      padding: 10px 12px 10px 38px;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-wrap input:focus { border-color: #0f3460; }

    select {
      padding: 10px 14px;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      font-size: 0.9rem;
      background: white;
      outline: none;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    select:focus { border-color: #0f3460; }

    #resultCount {
      font-size: 0.85rem;
      color: #888;
      margin-left: auto;
      white-space: nowrap;
    }

    .table-wrap {
      background: white;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      background: #f8f9fb;
      padding: 14px 16px;
      text-align: left;
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #666;
      border-bottom: 1.5px solid #eee;
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
    }

    thead th:hover { background: #eef0f4; }

    thead th .sort-icon { margin-left: 4px; opacity: 0.4; font-size: 0.7rem; }
    thead th.active .sort-icon { opacity: 1; color: #0f3460; }

    tbody tr {
      border-bottom: 1px solid #f0f0f0;
      transition: background 0.12s;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #f7f8fc; }

    td {
      padding: 14px 16px;
      font-size: 0.9rem;
      vertical-align: middle;
    }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.85rem;
      color: white;
      flex-shrink: 0;
    }

    .name-cell {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .name-cell .name { font-weight: 600; }
    .name-cell .email { font-size: 0.8rem; color: #888; }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 600;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #aaa;
    }

    .empty-state svg { margin-bottom: 12px; opacity: 0.4; }
    .empty-state p { font-size: 1rem; }

    #loadingRow td {
      text-align: center;
      padding: 40px;
      color: #aaa;
      font-size: 0.9rem;
    }

    @media (max-width: 700px) {
      .container { padding: 0 12px; }
      td:nth-child(4), th:nth-child(4),
      td:nth-child(6), th:nth-child(6) { display: none; }
    }

    /* ── Add Employee button ── */
    .btn-add {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 16px;
      background: #0f3460;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }
    .btn-add:hover { background: #1a4a80; }
    .btn-add:active { transform: scale(0.97); }

    /* ── Modal overlay ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 16px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: white;
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 540px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      transform: translateY(16px);
      transition: transform 0.2s;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal-overlay.open .modal { transform: translateY(0); }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    .modal-header h2 { font-size: 1.2rem; font-weight: 700; color: #1a1a2e; }

    .modal-close {
      background: none;
      border: none;
      cursor: pointer;
      color: #aaa;
      padding: 4px;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
      line-height: 1;
    }
    .modal-close:hover { color: #555; background: #f0f0f0; }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: 1 / -1; }

    .form-group label {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: #666;
    }

    .form-group input,
    .form-group select {
      padding: 10px 12px;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
    }
    .form-group input:focus,
    .form-group select:focus { border-color: #0f3460; }
    .form-group input.error,
    .form-group select.error { border-color: #e63946; }

    .form-error {
      font-size: 0.78rem;
      color: #e63946;
      min-height: 14px;
    }

    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 24px;
    }

    .btn-cancel {
      padding: 10px 18px;
      background: #f0f0f0;
      color: #555;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-cancel:hover { background: #e4e4e4; }

    .btn-submit {
      padding: 10px 20px;
      background: #0f3460;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-submit:hover { background: #1a4a80; }
    .btn-submit:disabled { background: #aaa; cursor: not-allowed; }

    .submit-alert {
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 500;
      margin-top: 16px;
      display: none;
    }
    .submit-alert.success { background: #e8f5e9; color: #2e7d32; display: block; }
    .submit-alert.error   { background: #fce4ec; color: #c62828; display: block; }
  </style>
</head>
<body>

<header>
  <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
    <circle cx="18" cy="18" r="18" fill="rgba(255,255,255,0.1)"/>
    <circle cx="18" cy="14" r="5" fill="white" opacity="0.9"/>
    <path d="M8 28c0-5.523 4.477-10 10-10s10 4.477 10 10" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.9"/>
  </svg>
  <div>
    <h1>Employee Directory</h1>
    <p>Manage and view all company employees</p>
  </div>
</header>

<div class="container">

  <div class="stats-row" id="statsRow">
    <div class="stat-card">
      <span class="label">Total Employees</span>
      <span class="value" id="statTotal">—</span>
    </div>
    <div class="stat-card">
      <span class="label">Departments</span>
      <span class="value" id="statDepts">—</span>
    </div>
    <div class="stat-card">
      <span class="label">Avg. Salary</span>
      <span class="value" id="statSalary">—</span>
    </div>
  </div>

  <div class="toolbar">
    <div class="search-wrap">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Search by name, position, or email…" />
    </div>
    <select id="deptFilter">
      <option value="all">All Departments</option>
    </select>
    <span id="resultCount"></span>
    <button class="btn-add" id="openModalBtn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <path d="M12 5v14M5 12h14"/>
      </svg>
      Add Employee
    </button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th data-col="id">ID <span class="sort-icon">▲</span></th>
          <th data-col="name">Employee <span class="sort-icon">▲</span></th>
          <th data-col="department">Department <span class="sort-icon">▲</span></th>
          <th data-col="position">Position <span class="sort-icon">▲</span></th>
          <th data-col="hire_date">Hire Date <span class="sort-icon">▲</span></th>
          <th data-col="salary">Salary <span class="sort-icon">▲</span></th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr id="loadingRow"><td colspan="6">Loading employees…</td></tr>
      </tbody>
    </table>
  </div>

</div>

<!-- Add Employee Modal -->
<div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle">Add New Employee</h2>
      <button class="modal-close" id="closeModalBtn" aria-label="Close">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <path d="M18 6L6 18M6 6l12 12"/>
        </svg>
      </button>
    </div>

    <form id="addEmployeeForm" novalidate>
      <div class="form-grid">

        <div class="form-group full">
          <label for="field-name">Full Name <span style="color:#e63946">*</span></label>
          <input type="text" id="field-name" placeholder="e.g. Jane Doe" required />
          <span class="form-error" id="err-name"></span>
        </div>

        <div class="form-group">
          <label for="field-email">Email <span style="color:#e63946">*</span></label>
          <input type="email" id="field-email" placeholder="jane@example.com" required />
          <span class="form-error" id="err-email"></span>
        </div>

        <div class="form-group">
          <label for="field-phone">Phone</label>
          <input type="text" id="field-phone" placeholder="555-0123" />
          <span class="form-error" id="err-phone"></span>
        </div>

        <div class="form-group">
          <label for="field-department">Department <span style="color:#e63946">*</span></label>
          <select id="field-department" required>
            <option value="">Select department…</option>
          </select>
          <span class="form-error" id="err-department"></span>
        </div>

        <div class="form-group">
          <label for="field-position">Position <span style="color:#e63946">*</span></label>
          <input type="text" id="field-position" placeholder="e.g. Senior Engineer" required />
          <span class="form-error" id="err-position"></span>
        </div>

        <div class="form-group">
          <label for="field-hire_date">Hire Date <span style="color:#e63946">*</span></label>
          <input type="date" id="field-hire_date" required />
          <span class="form-error" id="err-hire_date"></span>
        </div>

        <div class="form-group">
          <label for="field-salary">Salary (USD) <span style="color:#e63946">*</span></label>
          <input type="number" id="field-salary" min="0" step="1000" placeholder="e.g. 75000" required />
          <span class="form-error" id="err-salary"></span>
        </div>

      </div>

      <div class="submit-alert" id="submitAlert"></div>

      <div class="modal-footer">
        <button type="button" class="btn-cancel" id="cancelModalBtn">Cancel</button>
        <button type="submit" class="btn-submit" id="submitBtn">Add Employee</button>
      </div>
    </form>
  </div>
</div>

<script>
  const DEPT_COLORS = {
    'Engineering': ['#e8f4fd', '#1565c0'],
    'Marketing':   ['#fce4ec', '#c2185b'],
    'HR':          ['#e8f5e9', '#2e7d32'],
    'Finance':     ['#fff8e1', '#f57f17'],
    'Design':      ['#f3e5f5', '#6a1b9a'],
  };

  const AVATAR_COLORS = ['#e63946','#2196f3','#4caf50','#ff9800','#9c27b0','#00bcd4','#795548','#607d8b','#f06292','#26a69a'];

  let sortCol = 'id';
  let sortOrder = 'asc';
  let allEmployees = [];

  function avatarColor(name) {
    let h = 0;
    for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) >>> 0;
    return AVATAR_COLORS[h % AVATAR_COLORS.length];
  }

  function initials(name) {
    return name.split(' ').map(p => p[0]).join('').slice(0, 2).toUpperCase();
  }

  function deptBadge(dept) {
    const [bg, text] = DEPT_COLORS[dept] || ['#e0e0e0', '#555'];
    return `<span class="badge" style="background:${bg};color:${text}">${dept}</span>`;
  }

  function formatDate(d) {
    const [y, m, day] = d.split('-');
    return `${day}/${m}/${y}`;
  }

  function formatSalary(n) {
    return '$' + Number(n).toLocaleString('en-US', { minimumFractionDigits: 0 });
  }

  function renderTable(employees) {
    const tbody = document.getElementById('tableBody');
    document.getElementById('resultCount').textContent = `${employees.length} result${employees.length !== 1 ? 's' : ''}`;

    if (employees.length === 0) {
      tbody.innerHTML = `<tr><td colspan="6">
        <div class="empty-state">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
          </svg>
          <p>No employees match your search.</p>
        </div>
      </td></tr>`;
      return;
    }

    tbody.innerHTML = employees.map(emp => `
      <tr>
        <td style="color:#aaa;font-size:0.82rem">#${emp.id}</td>
        <td>
          <div class="name-cell">
            <div class="avatar" style="background:${avatarColor(emp.name)}">${initials(emp.name)}</div>
            <div>
              <div class="name">${emp.name}</div>
              <div class="email">${emp.email}</div>
            </div>
          </div>
        </td>
        <td>${deptBadge(emp.department)}</td>
        <td>${emp.position}</td>
        <td>${formatDate(emp.hire_date)}</td>
        <td style="font-weight:600">${formatSalary(emp.salary)}</td>
      </tr>
    `).join('');
  }

  function updateSortHeaders() {
    document.querySelectorAll('thead th').forEach(th => {
      const col = th.dataset.col;
      th.classList.toggle('active', col === sortCol);
      const icon = th.querySelector('.sort-icon');
      if (col === sortCol) {
        icon.textContent = sortOrder === 'asc' ? '▲' : '▼';
      } else {
        icon.textContent = '▲';
      }
    });
  }

  async function loadDepartments() {
    const res = await fetch('/api/departments');
    const depts = await res.json();
    const sel = document.getElementById('deptFilter');
    // Keep only the "All Departments" default option, then repopulate
    sel.innerHTML = '<option value="all">All Departments</option>';
    depts.forEach(d => {
      const opt = document.createElement('option');
      opt.value = d; opt.textContent = d;
      sel.appendChild(opt);
    });
    document.getElementById('statDepts').textContent = depts.length;
  }

  async function loadEmployees() {
    const search = document.getElementById('searchInput').value;
    const department = document.getElementById('deptFilter').value;
    const params = new URLSearchParams({ search, department, sort: sortCol, order: sortOrder });
    const res = await fetch(`/api/employees?${params}`);
    allEmployees = await res.json();
    renderTable(allEmployees);

    if (department === 'all' && !search) {
      document.getElementById('statTotal').textContent = allEmployees.length;
      const avg = allEmployees.reduce((s, e) => s + e.salary, 0) / (allEmployees.length || 1);
      document.getElementById('statSalary').textContent = '$' + Math.round(avg / 1000) + 'k';
    }
  }

  document.querySelectorAll('thead th[data-col]').forEach(th => {
    th.addEventListener('click', () => {
      const col = th.dataset.col;
      if (sortCol === col) {
        sortOrder = sortOrder === 'asc' ? 'desc' : 'asc';
      } else {
        sortCol = col;
        sortOrder = 'asc';
      }
      updateSortHeaders();
      loadEmployees();
    });
  });

  let debounceTimer;
  document.getElementById('searchInput').addEventListener('input', () => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(loadEmployees, 250);
  });

  document.getElementById('deptFilter').addEventListener('change', loadEmployees);

  updateSortHeaders();
  loadDepartments();
  loadEmployees();

  // ── Modal ──────────────────────────────────────────────────────────────
  const modalOverlay = document.getElementById('modalOverlay');
  const addForm      = document.getElementById('addEmployeeForm');
  const submitBtn    = document.getElementById('submitBtn');
  const submitAlert  = document.getElementById('submitAlert');

  function openModal() {
    // Populate department dropdown from the already-loaded list
    const deptSel = document.getElementById('field-department');
    deptSel.innerHTML = '<option value="">Select department…</option>';
    document.querySelectorAll('#deptFilter option').forEach(opt => {
      if (opt.value && opt.value !== 'all') {
        const o = document.createElement('option');
        o.value = opt.value;
        o.textContent = opt.textContent;
        deptSel.appendChild(o);
      }
    });
    modalOverlay.classList.add('open');
    document.getElementById('field-name').focus();
  }

  function closeModal() {
    modalOverlay.classList.remove('open');
    addForm.reset();
    clearFormErrors();
    submitAlert.className = 'submit-alert';
    submitAlert.textContent = '';
    submitBtn.disabled = false;
    submitBtn.textContent = 'Add Employee';
  }

  function clearFormErrors() {
    document.querySelectorAll('.form-error').forEach(el => el.textContent = '');
    document.querySelectorAll('.form-group input, .form-group select').forEach(el => el.classList.remove('error'));
  }

  function showFieldError(fieldId, msg) {
    document.getElementById('field-' + fieldId).classList.add('error');
    document.getElementById('err-' + fieldId).textContent = msg;
  }

  function validateForm() {
    clearFormErrors();
    let valid = true;
    const name      = document.getElementById('field-name').value.trim();
    const email     = document.getElementById('field-email').value.trim();
    const dept      = document.getElementById('field-department').value;
    const position  = document.getElementById('field-position').value.trim();
    const hire_date = document.getElementById('field-hire_date').value;
    const salary    = document.getElementById('field-salary').value;

    if (!name)      { showFieldError('name', 'Full name is required.');     valid = false; }
    if (!email)     { showFieldError('email', 'Email is required.');         valid = false; }
    else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                      showFieldError('email', 'Enter a valid email address.'); valid = false; }
    if (!dept)      { showFieldError('department', 'Select a department.');  valid = false; }
    if (!position)  { showFieldError('position', 'Position is required.');   valid = false; }
    if (!hire_date) { showFieldError('hire_date', 'Hire date is required.'); valid = false; }
    if (salary === '' || Number(salary) < 0) {
                      showFieldError('salary', 'Enter a valid salary.');      valid = false; }
    return valid;
  }

  document.getElementById('openModalBtn').addEventListener('click', openModal);
  document.getElementById('closeModalBtn').addEventListener('click', closeModal);
  document.getElementById('cancelModalBtn').addEventListener('click', closeModal);
  modalOverlay.addEventListener('click', (e) => { if (e.target === modalOverlay) closeModal(); });
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

  addForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    if (!validateForm()) return;

    const payload = {
      name:       document.getElementById('field-name').value.trim(),
      email:      document.getElementById('field-email').value.trim(),
      phone:      document.getElementById('field-phone').value.trim(),
      department: document.getElementById('field-department').value,
      position:   document.getElementById('field-position').value.trim(),
      hire_date:  document.getElementById('field-hire_date').value,
      salary:     Number(document.getElementById('field-salary').value),
    };

    submitBtn.disabled = true;
    submitBtn.textContent = 'Saving…';
    submitAlert.className = 'submit-alert';
    submitAlert.textContent = '';

    try {
      const res = await fetch('/api/employees', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      const data = await res.json();

      if (!res.ok) {
        submitAlert.className = 'submit-alert error';
        submitAlert.textContent = data.error || 'An error occurred. Please try again.';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Add Employee';
        return;
      }

      submitAlert.className = 'submit-alert success';
      submitAlert.textContent = `${data.name} was added successfully!`;
      setTimeout(() => {
        closeModal();
        loadEmployees();
        loadDepartments().then(() => {});
      }, 1000);

    } catch {
      submitAlert.className = 'submit-alert error';
      submitAlert.textContent = 'Network error. Please try again.';
      submitBtn.disabled = false;
      submitBtn.textContent = 'Add Employee';
    }
  });
</script>

</body>
</html>
